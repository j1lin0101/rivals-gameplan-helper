name: Scrape RoA2 Frame Data

on:
  schedule:
    # 12:00 PM PST = 20:00 UTC (UTC-8 standard) / 19:00 UTC (UTC-7 daylight)
    # Running at 20:00 UTC covers PST year-round
    - cron: '0 20 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scripts/cargo-scrape.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ app/public/data/
          git diff --staged --quiet || git commit -m "chore: daily frame data update $(date -u '+%Y-%m-%d')"
          git push
